spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:bitesdb}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# For Postgres integration, set these environment variables:
# SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/bitesdb
# SPRING_DATASOURCE_USERNAME=postgres
# SPRING_DATASOURCE_PASSWORD=yourpassword
# SPRING_DATASOURCE_DRIVER=org.postgresql.Driver
# SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
