name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: |
          cd React
          npm ci
      - name: Typecheck
        run: |
          cd React
          npm run typecheck
      - name: Build
        run: |
          cd React
          npm run build
      - name: Run tests
        run: |
          cd React
          npm test
